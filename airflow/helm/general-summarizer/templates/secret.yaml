apiVersion: v1
kind: Secret
metadata:
  name: {{ include "general-summarizer.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "general-summarizer.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_BASE: {{ .Values.llm.apiBase | quote }}
  LLM_API_KEY:  {{ .Values.llm.apiKey  | quote }}
  LLM_MODEL:    {{ .Values.llm.model   | quote }}
