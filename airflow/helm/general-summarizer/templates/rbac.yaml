apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "general-summarizer.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "general-summarizer.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "general-summarizer.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "general-summarizer.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Values.rbac.airflowNamespace }}
roleRef:
  kind: Role
  name: {{ include "general-summarizer.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
